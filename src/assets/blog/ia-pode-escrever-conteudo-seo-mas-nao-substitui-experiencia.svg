<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg  { fill: var(--brand-500); }
    .txt { fill: var(--brand-50); font-family: 'Outfit Variable', Outfit, system-ui, -apple-system, sans-serif; font-weight: 800; }
    .sub { fill: var(--brand-100); font-family: 'Outfit Variable', Outfit, system-ui, -apple-system, sans-serif; font-weight: 500; }
    .cor { stroke: var(--brand-300); stroke-width: 1.5; fill: none; stroke-opacity: 0.45; }
    .ico { stroke: var(--brand-50); stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; fill: none; opacity: 0.9; }
  </style>
  <rect width="1200" height="630" class="bg"/>
  <!-- Human + robot icon -->
  <g transform="translate(530, 135)">
    <!-- Person silhouette -->
    <circle cx="40" cy="22" r="18" class="ico"/>
    <path d="M10 100 Q10 60 40 60 Q70 60 70 100" class="ico"/>
    <!-- vs divider -->
    <line x1="85" y1="10" x2="85" y2="110" class="ico" stroke-opacity="0.4"/>
    <!-- Robot/AI symbol (circuit-like head) -->
    <rect x="100" y="10" width="40" height="36" rx="6" class="ico"/>
    <circle cx="113" cy="28" r="5" class="ico"/>
    <circle cx="127" cy="28" r="5" class="ico"/>
    <line x1="120" y1="46" x2="120" y2="60" class="ico"/>
    <path d="M100 60 Q100 100 120 100 Q140 100 140 60" class="ico"/>
    <!-- X over robot -->
    <line x1="100" y1="10" x2="140" y2="46" stroke="var(--brand-50)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <line x1="140" y1="10" x2="100" y2="46" stroke="var(--brand-50)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  </g>
  <text x="600" y="375" font-size="54" text-anchor="middle" letter-spacing="-1" class="txt">IA Escreve. Experiência Vende.</text>
  <text x="600" y="450" font-size="28" text-anchor="middle" class="sub">Por que conteúdo humano ainda é o maior diferencial no SEO</text>
  <path d="M 36 60 L 36 36 L 60 36" class="cor"/>
  <path d="M 1140 36 L 1164 36 L 1164 60" class="cor"/>
  <path d="M 36 570 L 36 594 L 60 594" class="cor"/>
  <path d="M 1140 594 L 1164 594 L 1164 570" class="cor"/>
</svg>
