<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: var(--brand-500); }
    .txt { fill: var(--brand-50); font-weight: 800; font-family: system-ui, sans-serif; }
    .sub { fill: var(--brand-100); font-weight: 500; font-family: system-ui, sans-serif; }
    .cor { stroke: var(--brand-300); fill: none; opacity: 0.45; }
    .ico { stroke: var(--brand-50); fill: none; opacity: 0.9; stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Background -->
  <rect width="1200" height="630" class="bg"/>

  <!-- Corner decorations -->
  <rect x="20" y="20" width="60" height="60" rx="6" class="cor" stroke-width="2"/>
  <rect x="30" y="30" width="40" height="40" rx="4" class="cor" stroke-width="1.5"/>
  <rect x="1120" y="20" width="60" height="60" rx="6" class="cor" stroke-width="2"/>
  <rect x="1130" y="30" width="40" height="40" rx="4" class="cor" stroke-width="1.5"/>
  <rect x="20" y="550" width="60" height="60" rx="6" class="cor" stroke-width="2"/>
  <rect x="30" y="560" width="40" height="40" rx="4" class="cor" stroke-width="1.5"/>
  <rect x="1120" y="550" width="60" height="60" rx="6" class="cor" stroke-width="2"/>
  <rect x="1130" y="560" width="40" height="40" rx="4" class="cor" stroke-width="1.5"/>

  <!-- Decorative arcs -->
  <circle cx="600" cy="315" r="300" class="cor" stroke-width="0.8"/>
  <circle cx="150" cy="315" r="160" class="cor" stroke-width="1"/>
  <circle cx="1050" cy="315" r="160" class="cor" stroke-width="1"/>

  <!-- Icon: downward arrow / chart decline — centered -->
  <!-- Chart base -->
  <line x1="520" y1="350" x2="680" y2="350" class="ico" stroke-width="2.5"/>
  <line x1="520" y1="350" x2="520" y2="160" class="ico" stroke-width="2.5"/>
  <!-- Declining line -->
  <polyline points="530,175 560,195 590,210 620,245 650,285 675,335" class="ico" stroke-width="3.5"/>
  <!-- Dots on line -->
  <circle cx="530" cy="175" r="5" class="ico" stroke-width="2"/>
  <circle cx="560" cy="195" r="5" class="ico" stroke-width="2"/>
  <circle cx="590" cy="210" r="5" class="ico" stroke-width="2"/>
  <circle cx="620" cy="245" r="5" class="ico" stroke-width="2"/>
  <circle cx="650" cy="285" r="5" class="ico" stroke-width="2"/>
  <circle cx="675" cy="335" r="5" class="ico" stroke-width="2"/>
  <!-- Down arrow at end -->
  <line x1="675" y1="335" x2="675" y2="360" class="ico" stroke-width="3"/>
  <polyline points="660,348 675,365 690,348" class="ico" stroke-width="2.5"/>

  <!-- Main title -->
  <text x="600" y="415" class="txt" text-anchor="middle" font-size="52">Tráfego de Referral em Queda Livre</text>

  <!-- Subtitle -->
  <text x="600" y="465" class="sub" text-anchor="middle" font-size="28">O que publishers menores precisam entender — e fazer — agora</text>

  <!-- Bottom tag -->
  <text x="600" y="518" class="sub" text-anchor="middle" font-size="20" opacity="0.7">Neil Patel · NP Digital</text>
</svg>
